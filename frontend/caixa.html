<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa - PodPá</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style-mobile.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="company-logo">
                    <img src="/assets/logo.png" alt="PodPá Logo" onerror="this.style.display='none'">
                    <h2>PODPÁ</h2>
                </div>
            </div>
            <ul class="sidebar-menu">
                <li onclick="window.location.href='/dashboard.html'">📊 Dashboard</li>
                <li onclick="window.location.href='/produtos.html'">📦 Produtos</li>
                <li onclick="window.location.href='/vendas.html'">💰 Vendas</li>
                <li onclick="window.location.href='/historico-vendas.html'">📋 Histórico</li>
                <li class="active">💵 Caixa</li>
                <li onclick="window.location.href='/gastos.html'">💸 Gastos</li>
                <li onclick="window.location.href='/financeiro.html'">📈 Financeiro</li>
                <li onclick="window.location.href='/categorias.html'">🏷️ Categorias</li>
            </ul>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <h1>Gerenciamento de Caixa</h1>
                <div class="user-info">
                    <span id="userNome"></span>
                    <span id="userRole" class="badge"></span>
                    <button class="logout-btn" id="logoutBtn">Sair</button>
                </div>
            </div>
            
            <div class="caixa-status" id="caixaStatus">
                <!-- Status será carregado via JavaScript -->
            </div>
            
            <!-- Histórico de Caixas (apenas admin) -->
            <div class="quick-table" id="historicoCaixa" style="display: none;">
                <div class="quick-table-header">
                    <h3>📋 Histórico de Caixas</h3>
                </div>
                <div class="table-container">
                    <table id="tabelaHistoricoCaixa">
                        <thead>
                            <tr>
                                <th>Data Abertura</th>
                                <th>Data Fechamento</th>
                                <th>Valor Inicial</th>
                                <th>Total Vendas</th>
                                <th>Valor Final</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modal Abrir Caixa -->
    <div id="modalAbrirCaixa" class="modal">
        <div class="modal-content">
            <span class="close" onclick="Caixa.fecharModalAbrir()">&times;</span>
            <h2>🔓 Abrir Caixa</h2>
            <form id="formAbrirCaixa">
                <div class="form-group">
                    <label for="valorInicial">Valor Inicial (R$)</label>
                    <input type="number" id="valorInicial" step="0.01" min="0" value="0" required>
                </div>
                <div class="form-group">
                    <label for="observacaoAbertura">Observação (opcional)</label>
                    <textarea id="observacaoAbertura" rows="2" placeholder="Ex: Abertura do caixa..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Abrir Caixa</button>
            </form>
        </div>
    </div>
    
    <!-- Modal Fechar Caixa -->
    <div id="modalFecharCaixa" class="modal">
        <div class="modal-content">
            <span class="close" onclick="Caixa.fecharModalFechar()">&times;</span>
            <h2>🔒 Fechar Caixa</h2>
            <div id="resumoFechamento" class="card" style="margin-bottom: 20px;"></div>
            
            <form id="formFecharCaixa">
                <div class="form-group">
                    <label for="senhaAdmin">🔐 Senha de Administrador</label>
                    <input type="password" id="senhaAdmin" placeholder="Digite sua senha" required>
                </div>
                <div class="form-group">
                    <label for="observacaoFechamento">Observação (opcional)</label>
                    <textarea id="observacaoFechamento" rows="2" placeholder="Ex: Fechamento do caixa..."></textarea>
                </div>
                <button type="submit" class="btn btn-warning">Fechar Caixa</button>
            </form>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/realtime.js"></script>
    <script src="/js/caixa.js"></script>
    
    <!-- Menu Hambúrguer -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.createElement('button');
            menuToggle.className = 'menu-toggle';
            menuToggle.innerHTML = '☰';
            document.body.appendChild(menuToggle);
            
            const overlay = document.createElement('div');
            overlay.className = 'sidebar-overlay';
            document.body.appendChild(overlay);
            
            const sidebar = document.querySelector('.sidebar');
            
            menuToggle.addEventListener('click', function() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                menuToggle.innerHTML = sidebar.classList.contains('active') ? '✕' : '☰';
            });
            
            overlay.addEventListener('click', function() {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                menuToggle.innerHTML = '☰';
            });
        });
    </script>
</body>
</html>
