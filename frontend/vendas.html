<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Vendas - PodPá</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>PODPÁ</h3>
            </div>
            <ul class="sidebar-menu">
                <li onclick="window.location.href = '/dashboard.html'">
                    <i>📊</i> <span>Dashboard</span>
                </li>
                <li onclick="window.location.href = '/produtos.html'">
                    <i>📦</i> <span>Produtos</span>
                </li>
                <li class="active">
                    <i>💰</i> <span>Vendas</span>
                </li>
                <li onclick="window.location.href = '/historico-vendas.html'">
                    <i>📋</i> <span>Histórico</span>
                </li>
                <li onclick="window.location.href = '/categorias.html'">
                    <i>🏷️</i> <span>Categorias</span>
                </li>
                <li onclick="window.location.href = '/relatorios.html'">
                    <i>📈</i> <span>Relatórios</span>
                </li>
                <li onclick="window.location.href='/gastos.html'">
                    <i>💸</i> <span>Gastos</span>
                </li>
                <li onclick="window.location.href='/financeiro.html'">
                    <i>📊</i> <span>Financeiro</span>
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Vendas</h1>
                <div class="user-info">
                    <span id="userNome"></span>
                    <span id="userRole" class="badge"></span>
                    <button class="logout-btn" id="logoutBtn">Sair</button>
                </div>
            </div>

            <div class="cards-container">
                <!-- Card do Carrinho -->
                <div class="card">
                    <h3>Carrinho</h3>
                    <div id="carrinhoItens" class="cart-container"></div>

                    <div class="cart-total">
                        <span>Total:</span>
                        <span id="carrinhoTotal">R$ 0,00</span>
                    </div>

                    <div class="cart-total">
                        <span>Lucro estimado:</span>
                        <span id="carrinhoLucro">R$ 0,00</span>
                    </div>

                    <div style="margin-top: 20px">
                        <label for="formaPagamento" style="display: block; margin-bottom: 8px; color: var(--text-secondary);">Forma de Pagamento</label>
                        <select id="formaPagamento" class="form-group" required>
                            <option value="">Selecione o pagamento</option>
                            <option value="Dinheiro">💰 Dinheiro</option>
                            <option value="Débito">💳 Débito</option>
                            <option value="Crédito">💳 Crédito</option>
                            <option value="Pix">📱 Pix</option>
                        </select>
                    </div>

                    <div class="cart-buttons">
                        <button class="btn btn-primary btn-finalizar" id="btnFinalizarVenda">
                            Finalizar Venda
                        </button>
                        <button class="btn btn-danger btn-limpar" id="btnLimparCarrinho">
                            Limpar
                        </button>
                    </div>
                </div>

                <!-- Card de Produtos -->
                <div class="card" style="flex: 2">
                    <h3>Produtos</h3>

                    <div class="search-bar">
                        <input
                            type="text"
                            id="buscaProduto"
                            placeholder="Buscar produtos... (Ctrl + K)"
                        />
                        <button class="btn btn-primary" id="btnLerCodigo" style="display: flex; align-items: center; gap: 5px; white-space: nowrap;">
                            <span>📷</span> Ler Código
                        </button>
                    </div>

                    <div class="produtos-grid" id="listaProdutos">
                        <!-- Produtos serão carregados aqui -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/realtime.js"></script>
    <script src="/js/barcode-reader.js"></script>
    
    <script>
    // Menu Hambúrguer para mobile
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.createElement('button');
        menuToggle.className = 'menu-toggle';
        menuToggle.innerHTML = '☰';
        menuToggle.setAttribute('aria-label', 'Abrir menu');
        
        const overlay = document.createElement('div');
        overlay.className = 'sidebar-overlay';
        
        document.body.appendChild(menuToggle);
        document.body.appendChild(overlay);
        
        const sidebar = document.querySelector('.sidebar');
        
        menuToggle.addEventListener('click', function() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.classList.toggle('active');
            menuToggle.innerHTML = sidebar.classList.contains('active') ? '✕' : '☰';
        });
        
        overlay.addEventListener('click', function() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            menuToggle.classList.remove('active');
            menuToggle.innerHTML = '☰';
        });
        
        // Fechar menu ao clicar em um item
        document.querySelectorAll('.sidebar-menu li').forEach(item => {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                    menuToggle.classList.remove('active');
                    menuToggle.innerHTML = '☰';
                }
            });
        });
    });
    </script>
</body>
</html>
