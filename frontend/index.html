<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega System - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: var(--border-radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .login-info p {
            margin: 5px 0;
        }
        .login-info strong {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>🍷 Adega System</h2>
            <form id="loginForm">
                <div class="error-message" id="loginError"></div>
                <input type="text" id="username" placeholder="Usuário" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
            
            <div class="login-info">
                <p><strong>👑 Admin:</strong> admin / admin123</p>
                <p><strong>👤 Funcionário:</strong> funcionario / func123</p>
                <p style="font-size: 11px; margin-top: 10px;">Funcionário tem acesso limitado a vendas e estoque</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('loginError');
            
            const result = await Auth.login(username, password);
            
            if (result.success) {
                window.location.href = '/dashboard.html';
            } else {
                errorElement.textContent = result.error || 'Erro ao fazer login';
            }
        });
    </script>
</body>
</html>
