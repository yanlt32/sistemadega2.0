<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodPá - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Estilos exclusivos para o login */
        .login-container {
            position: relative;
            overflow: hidden;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(196, 167, 71, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .login-box {
            background: rgba(26, 31, 38, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(196, 167, 71, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }
        
        .login-box h2 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent-primary);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .login-box h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--accent-primary);
            margin: 15px auto 0;
            border-radius: 3px;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(196, 167, 71, 0.2);
        }
        
        .input-group .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--accent-primary);
            opacity: 0.7;
        }
        
        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        
        .login-box button:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196, 167, 71, 0.3);
        }
        
        .login-box button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .error-message {
            color: var(--danger);
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            min-height: 20px;
            padding: 8px;
            background: rgba(185, 28, 60, 0.1);
            border-radius: var(--border-radius-sm);
        }
        
        .login-footer {
            margin-top: 25px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid rgba(196, 167, 71, 0.2);
            padding-top: 15px;
        }
        
        .credits {
            margin-top: 10px;
            font-size: 12px;
        }
        
        .credits a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .credits a:hover {
            color: var(--accent-secondary);
            text-decoration: underline;
        }
        
        .version {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>PODPÁ</h2>
            
            <form id="loginForm" autocomplete="off">
                <div class="error-message" id="loginError"></div>
                
                <div class="input-group">
                    <span class="icon"></span>
                    <input type="text" 
                           id="username" 
                           name="username"
                           placeholder="Usuário" 
                           autocomplete="off"
                           required>
                </div>
                
                <div class="input-group">
                    <span class="icon"></span>
                    <input type="password" 
                           id="password" 
                           name="password"
                           placeholder="Senha" 
                           autocomplete="off"
                           required>
                </div>
                
                <button type="submit" id="btnLogin">Entrar</button>
            </form>
            
            <div class="login-footer">
                <p>Sistema PodPá © 2026</p>
                <div class="credits">
                    Desenvolvido por <a href="https://www.linkedin.com/in/yan-tortelli-65501633b/" target="_blank">Yan Tortelli</a>
                </div>
                <p class="version">Versão 2.0.0</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const errorElement = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                errorElement.textContent = 'Usuário e senha são obrigatórios';
                return;
            }

            btnLogin.disabled = true;
            btnLogin.classList.add('btn-loading');
            errorElement.textContent = '';

            try {
                const response = await API.login(username, password);
                
                if (response.token) {
                    localStorage.setItem('token', response.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    window.location.href = '/dashboard.html';
                }
            } catch (error) {
                errorElement.textContent = error.message || 'Erro ao fazer login';
                btnLogin.disabled = false;
                btnLogin.classList.remove('btn-loading');
            }
        });

        // Limpar mensagem de erro ao digitar
        document.getElementById('username').addEventListener('input', () => {
            errorElement.textContent = '';
        });

        document.getElementById('password').addEventListener('input', () => {
            errorElement.textContent = '';
        });
    </script>
</body>
</html>
