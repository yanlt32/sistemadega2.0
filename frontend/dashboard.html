<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Adega System</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>🍷 Adega</h3>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><i>📊</i> <span>Dashboard</span></li>
                <li onclick="window.location.href='/produtos.html'"><i>📦</i> <span>Produtos</span></li>
                <li onclick="window.location.href='/vendas.html'"><i>💰</i> <span>Vendas</span></li>
                <li onclick="window.location.href='/categorias.html'"><i>🏷️</i> <span>Categorias</span></li>
                <li onclick="window.location.href='/relatorios.html'"><i>📈</i> <span>Relatórios</span></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <h1>Dashboard</h1>
                <div class="user-info">
                    <span id="userNome"></span>
                    <button class="logout-btn" id="logoutBtn">Sair</button>
                </div>
            </div>
            
            <div class="cards-container">
                <div class="card">
                    <h3>Vendas Hoje</h3>
                    <div class="value" id="vendasHoje">R$ 0,00</div>
                    <div class="subtitle">Total do dia</div>
                </div>
                
                <div class="card">
                    <h3>Lucro Hoje</h3>
                    <div class="value" id="lucroHoje">R$ 0,00</div>
                    <div class="subtitle">Lucro do dia</div>
                </div>
                
                <div class="card">
                    <h3>Vendas do Mês</h3>
                    <div class="value" id="vendasMes">R$ 0,00</div>
                    <div class="subtitle">Total mensal</div>
                </div>
                
                <div class="card">
                    <h3>Estoque Baixo</h3>
                    <div class="value" id="estoqueBaixo">0</div>
                    <div class="subtitle">Produtos</div>
                </div>
            </div>
            
            <div class="card">
                <h3>Gráfico de Vendas</h3>
                <div style="height: 300px;">
                    <canvas id="graficoVendas"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h3>Produtos com Estoque Baixo</h3>
                <div id="estoqueBaixoLista"></div>
            </div>
        </main>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
